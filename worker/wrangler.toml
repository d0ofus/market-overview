name = "market-command-worker"
main = "src/index.ts"
compatibility_date = "2025-01-15"

[vars]
APP_TIMEZONE = "Australia/Melbourne"
DATA_PROVIDER = "alpaca"
ALPACA_FEED = "iex"
TRADINGVIEW_WIDGET_ENABLED = "true"
ALERTS_RECONCILE_ENABLED = "false"
ALERTS_ENABLE_YFINANCE_FALLBACK = "true"
ALERTS_EMAIL_ALLOWED_FROM = "tradingview.com"
IBKR_NEWS_ENABLED = "false"
GEMINI_MODEL = "gemini-3.5-flash"
GEMINI_SEARCH_GROUNDING_ENABLED = "false"
MARKET_COMMENTARY_RETENTION_DAYS = "30"
WEEKLY_MARKET_REVIEW_SCHEDULE_TIMEZONE = "Australia/Melbourne"
WEEKLY_MARKET_REVIEW_SCHEDULE_DAY = "Saturday"
WEEKLY_MARKET_REVIEW_SCHEDULE_TIME = "11:00"
WEEKLY_MARKET_REVIEW_HERMES_GRACE_MINUTES = "180"
MARKET_OVERVIEW_PUBLIC_URL = "https://market-overview-nu.vercel.app"

[[d1_databases]]
binding = "DB"
database_name = "market_command"
database_id = "30528f34-b249-4d93-9b18-1d60a36df85d"

[[d1_databases]]
binding = "SCANNER_CACHE_DB"
database_name = "market_rs"
database_id = "6837481f-3dd3-4f7c-933d-7927b5c755cd"

[[d1_databases]]
binding = "FUNDAMENTALS_DB"
database_name = "market_fundamentals"
database_id = "3380987f-47a5-4ffe-8593-30d9f6b9ffbe"

[[d1_databases]]
binding = "PATTERN_DB"
database_name = "market_patterns"
database_id = "979ab7bb-8c24-4978-b07a-66914d92ac04"

[[d1_databases]]
binding = "PERPLEXITY_CACHE_DB"
database_name = "market_perplexity_cache"
database_id = "efc8828b-6a94-41bd-9f7d-f3b6ece191c4"

[triggers]
crons = [
  "*/15 * * * *",
  "2,17,32,47 * * * *",
  "5,20,35,50 * * * *",
  "8,23,38,53 * * * *",
  "11,26,41,56 * * * *",
]
